name: CI/CD Mi Club (Multi-ambiente)

on:
  push:
    branches:
      - desa
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Definir etiqueta de entorno
        id: vars
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=desa" >> "$GITHUB_OUTPUT"
          fi

      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mi-club:${{ steps.vars.outputs.tag }}

      - name: Desplegar en DESA
        if: github.ref_name == 'desa'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          port: 5416
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /root/admin-club/desa
            export DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/mi-club:desa
            docker compose pull
            docker compose up -d --no-build
            docker image prune -f

      - name: Desplegar en PROD
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST_PROD }}
          port: 5416
          username: ${{ secrets.VPS_USER_PROD }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd /root/admin-club/prod
            export DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/mi-club:prod
            docker compose pull
            docker compose up -d --no-build
            docker image prune -f
