name: CI/CD Mi Club (Multi-ambiente)

on:
  push:
    branches:
      - desa  # Activa el despliegue a DESA
      - prod     # Activa el despliegue a PROD

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Detectar dinámicamente si es DESA o PROD para la etiqueta de Docker
    - name: Definir etiqueta de entorno
      id: vars
      run: |
        if [ "${{ github.ref_name }}" = "prod" ]; then
          echo "tag=prod" >> $GITHUB_OUTPUT
        else
          echo "tag=desa" >> $GITHUB_OUTPUT
        fi

    # Construye la imagen con el tag correspondiente (mi-club:desa o mi-club:prod)
    - name: Construir y subir imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/mi-club:${{ steps.vars.outputs.tag }}

    # --- DESPLIEGUE A DESARROLLO (Solo si el push fue en 'desa') ---
    - name: Desplegar en DESA
      if: github.ref_name == 'desa'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }} # Tu IP de DESA
        port: 5416
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /root/admin-club/desa
          docker compose pull
          docker compose up -d
          docker image prune -f

    # --- DESPLIEGUE A PRODUCCIÓN (Solo si el push fue en 'prod') ---
    - name: Desplegar en PROD
      if: github.ref_name == 'prod'
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST_PROD }} # Tu IP de PROD
        port: 5416
        username: ${{ secrets.VPS_USER_PROD }}
        key: ${{ secrets.VPS_SSH_KEY_PROD }}
        script: |
          cd /root/admin-club/prod
          docker compose pull
          docker compose up -d
          docker image prune -f