<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/layout :: head}" />

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{layout/layout :: header}"></header>

	<main class="flex-grow-1 bg-light">
		<div class="container-fluid px-3 px-lg-4 py-3 py-lg-4" style="max-width: 1000px;">

			<div class="mb-3">
				<a th:href="@{/listadoPagos}" class="btn btn-outline-secondary btn-sm rounded-pill">
					<i class="fas fa-arrow-left me-1"></i> Volver a pagos
				</a>
			</div>

			<div class="card border-0 shadow-sm rounded-3 overflow-hidden">
				<div class="card-header bg-white border-bottom py-3 px-3 px-lg-4 d-flex flex-wrap align-items-center justify-content-between gap-2">
					<div class="d-flex align-items-center gap-2">
						<span class="rounded-circle bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center"
							style="width:40px;height:40px;">
							<i class="fas fa-file-invoice-dollar"></i>
						</span>
						<div>
							<h1 class="h5 mb-0 fw-semibold text-dark">
								Orden de pago #<span th:text="${orden.id}">0</span>
							</h1>
							<p class="small text-muted mb-0">Detalle y cuotas asociadas</p>
						</div>
					</div>
					<span class="badge rounded-pill fs-6"
						th:classappend="${orden.estado.name() == 'PAGADO'} ? ' bg-success' : ' bg-warning text-dark'"
						th:text="${orden.estado}">—</span>
				</div>
				<div class="card-body p-3 p-lg-4">

					<div class="row g-3 mb-4">
						<div class="col-md-4">
							<p class="small text-muted text-uppercase mb-1">Medio</p>
							<p class="mb-0 fw-medium" th:text="${orden.medioPago}">—</p>
						</div>
						<div class="col-md-4">
							<p class="small text-muted text-uppercase mb-1">Monto total</p>
							<p class="mb-0 fw-semibold text-primary">$ <span th:text="${orden.montoTotal}">0</span></p>
						</div>
					</div>

					<h2 class="h6 text-primary border-bottom pb-2 mb-3">
						<i class="fas fa-list-ul me-1"></i> Pagos asociados
					</h2>

					<div class="table-responsive rounded-3 border">
						<table class="table table-sm align-middle table-striped table-hover mb-0">
							<thead class="bg-primary text-white">
								<tr>
									<th>Deportista</th>
									<th class="text-nowrap">Mes</th>
									<th class="text-nowrap">Año</th>
									<th>Estado</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="p : ${orden.pagos}">
									<td th:text="${p.deportista.nombre + ' ' + p.deportista.apellido}">—</td>
									<td th:text="${p.nombreMes}">—</td>
									<td th:text="${p.anio}">—</td>
									<td>
										<span class="badge rounded-pill" th:classappend="${p.colorEstado}" th:text="${p.estado}"></span>
									</td>
								</tr>
							</tbody>
						</table>
					</div>

					<div class="mt-4 d-flex flex-wrap gap-2">
						<a th:if="${orden.khipuUrl != null}" th:href="${orden.khipuUrl}" target="_blank" rel="noopener"
							class="btn btn-primary btn-sm rounded-pill">
							<i class="fas fa-external-link-alt me-1"></i> Ver en Khipu
						</a>
					</div>

				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{layout/layout :: footer}"></footer>
</body>

</html>
