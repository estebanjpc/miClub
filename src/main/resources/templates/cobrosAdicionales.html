<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/layout :: head}" />

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{layout/layout :: header}"></header>

	<main class="flex-grow-1 bg-light">
		<div class="container-fluid px-3 px-lg-4 py-3 py-lg-4" style="max-width: 1200px;">
			<div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
				<div>
					<h3 class="fw-bold text-primary mb-0" th:text="${titulo}">Cobros adicionales</h3>
					<p class="text-muted small mb-0 mt-1">Crea cobros por matrícula, implementación u otros conceptos.</p>
				</div>
			</div>

			<div class="card border-0 shadow-sm rounded-3 mb-3">
				<div class="card-body">
					<form th:action="@{/cobros-adicionales/crear}" th:object="${form}" method="post" class="row g-3">
						<div class="col-md-3">
							<label class="form-label fw-semibold">Tipo</label>
							<select th:field="*{tipoCobro}" class="form-select">
								<option value="MATRICULA">Matrícula</option>
								<option value="IMPLEMENTACION">Implementación</option>
								<option value="OTRO">Otro</option>
							</select>
						</div>
						<div class="col-md-5">
							<label class="form-label fw-semibold">Descripción (si tipo = Otro)</label>
							<input th:field="*{descripcion}" type="text" class="form-control" maxlength="255"
								placeholder="Ej: Gira deportiva, uniforme, etc." />
						</div>
						<div class="col-md-2">
							<label class="form-label fw-semibold">Monto</label>
							<input th:field="*{monto}" type="number" min="1" class="form-control" />
						</div>
						<div class="col-md-1">
							<label class="form-label fw-semibold">Mes</label>
							<input th:field="*{mes}" type="number" min="1" max="12" class="form-control" />
						</div>
						<div class="col-md-1">
							<label class="form-label fw-semibold">Año</label>
							<input th:field="*{anio}" type="number" min="2000" max="2100" class="form-control" />
						</div>
						<div class="col-md-3">
							<label class="form-label fw-semibold">Asignar a</label>
							<select th:field="*{alcance}" class="form-select" id="alcanceSelect">
								<option value="TODOS">Todos los deportistas</option>
								<option value="CATEGORIA">Categoría completa</option>
								<option value="DEPORTISTA">Deportista específico</option>
							</select>
						</div>
						<div class="col-md-4" id="bloqueCategoria">
							<label class="form-label fw-semibold">Categoría</label>
							<select th:field="*{categoriaId}" class="form-select">
								<option th:value="${null}">Seleccione</option>
								<option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}"></option>
							</select>
						</div>
						<div class="col-md-5" id="bloqueDeportista">
							<label class="form-label fw-semibold">Deportista</label>
							<select th:field="*{deportistaId}" class="form-select">
								<option th:value="${null}">Seleccione</option>
								<option th:each="d : ${deportistas}" th:value="${d.id}"
									th:text="${d.nombre + ' ' + d.apellido}"></option>
							</select>
						</div>
						<div class="col-12">
							<button type="submit" class="btn btn-primary rounded-pill px-4">
								<i class="fas fa-plus-circle me-1"></i> Crear cobro adicional
							</button>
						</div>
					</form>
				</div>
			</div>

			<div class="card border-0 shadow-sm rounded-3 overflow-hidden">
				<div class="card-header bg-white border-bottom py-3">
					<h6 class="mb-0">Cobros adicionales registrados</h6>
				</div>
				<div class="table-responsive">
					<table class="table table-sm table-striped mb-0">
						<thead class="table-light">
							<tr>
								<th>#</th>
								<th>Deportista</th>
								<th>Concepto</th>
								<th>Período</th>
								<th class="text-end">Monto</th>
								<th>Estado</th>
								<th>Detalle</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="p, s : ${cobros}">
								<td th:text="${s.index + 1}"></td>
								<td th:text="${p.deportista.nombre + ' ' + p.deportista.apellido}">—</td>
								<td th:text="${p.concepto}">—</td>
								<td th:text="${p.mes + '/' + p.anio}">—</td>
								<td class="text-end" th:text="${'$ ' + #numbers.formatInteger(p.monto, 0)}">0</td>
								<td><span class="badge" th:classappend="${p.colorEstado}" th:text="${p.estado}"></span></td>
								<td th:text="${p.observacion != null ? p.observacion : '—'}">—</td>
							</tr>
							<tr th:if="${cobros == null or cobros.isEmpty()}">
								<td colspan="7" class="text-center text-muted py-4">Sin cobros adicionales.</td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{layout/layout :: footer}"></footer>
	<script>
		(function () {
			const alcance = document.getElementById('alcanceSelect');
			const bCat = document.getElementById('bloqueCategoria');
			const bDep = document.getElementById('bloqueDeportista');
			function sync() {
				const v = alcance.value;
				bCat.style.display = (v === 'CATEGORIA') ? '' : 'none';
				bDep.style.display = (v === 'DEPORTISTA') ? '' : 'none';
			}
			alcance.addEventListener('change', sync);
			sync();
		})();
	</script>
</body>

</html>
