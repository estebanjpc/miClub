<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/layout :: head}" />

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{layout/layout :: header}"></header>

	<main class="flex-grow-1 bg-light">
		<div class="container py-4">
			<div class="mb-3">
				<h3 class="fw-bold text-primary mb-1" th:text="${titulo}">Configuración de meses sin cobro</h3>
				<p class="text-muted small mb-0">Define períodos donde no se generan ni se cobran cuotas, por club, categoría o deportista.</p>
			</div>

			<div class="row g-3">
				<div class="col-lg-5">
					<div class="card shadow-sm border-0">
						<div class="card-body">
							<form th:action="@{/no-pago}" method="post" th:object="${form}">
								<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

								<div class="row g-2">
									<div class="col-6">
										<label class="form-label small">Mes</label>
										<select class="form-select" th:field="*{mes}">
											<option value="1">Enero</option>
											<option value="2">Febrero</option>
											<option value="3">Marzo</option>
											<option value="4">Abril</option>
											<option value="5">Mayo</option>
											<option value="6">Junio</option>
											<option value="7">Julio</option>
											<option value="8">Agosto</option>
											<option value="9">Septiembre</option>
											<option value="10">Octubre</option>
											<option value="11">Noviembre</option>
											<option value="12">Diciembre</option>
										</select>
									</div>
									<div class="col-6">
										<label class="form-label small">Año</label>
										<input class="form-control" type="number" th:field="*{anio}" min="2000" max="2100" />
									</div>
								</div>

								<div class="mt-3">
									<label class="form-label small">Alcance</label>
									<select class="form-select" th:field="*{scope}" id="scopeSelect">
										<option value="CLUB">Todo el club</option>
										<option value="CATEGORIA">Categoría</option>
										<option value="DEPORTISTA">Deportista</option>
									</select>
								</div>

								<div class="mt-3 d-none" id="categoriaWrap">
									<label class="form-label small">Categoría</label>
									<select class="form-select" th:field="*{categoriaId}">
										<option value="">Selecciona categoría</option>
										<option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}">Categoría</option>
									</select>
								</div>

								<div class="mt-3 d-none" id="deportistaWrap">
									<label class="form-label small">Deportista</label>
									<select class="form-select" th:field="*{deportistaId}">
										<option value="">Selecciona deportista</option>
										<option th:each="d : ${deportistas}" th:value="${d.id}"
											th:text="${d.nombre + ' ' + d.apellido}">Deportista</option>
									</select>
								</div>

								<div class="mt-3">
									<label class="form-label small">Observación (opcional)</label>
									<input class="form-control" th:field="*{observacion}" maxlength="255" />
								</div>

								<button type="submit" class="btn btn-primary rounded-pill px-4 mt-3">
									<i class="fas fa-plus me-1"></i> Agregar No Pago
								</button>
							</form>
						</div>
					</div>
				</div>

				<div class="col-lg-7">
					<div class="card shadow-sm border-0">
						<div class="card-body">
							<h6 class="fw-semibold mb-3">Configuraciones vigentes</h6>
							<div class="table-responsive">
								<table class="table table-sm align-middle">
									<thead>
										<tr>
											<th>Período</th>
											<th>Alcance</th>
											<th>Detalle</th>
											<th></th>
										</tr>
									</thead>
									<tbody>
										<tr th:if="${configs == null || #lists.isEmpty(configs)}">
											<td colspan="4" class="text-muted">Sin configuraciones registradas.</td>
										</tr>
										<tr th:each="c : ${configs}">
											<td th:text="${c.mes + '/' + c.anio}">4/2026</td>
											<td th:text="${c.scope}">CLUB</td>
											<td>
												<span th:if="${c.scope == 'CLUB'}">Todo el club</span>
												<span th:if="${c.scope == 'CATEGORIA'}" th:text="${c.categoria != null ? c.categoria.nombre : '-'}">Categoría</span>
												<span th:if="${c.scope == 'DEPORTISTA'}"
													th:text="${c.deportista != null ? c.deportista.nombre + ' ' + c.deportista.apellido : '-'}">Deportista</span>
												<div class="small text-muted" th:if="${c.observacion != null && !#strings.isEmpty(c.observacion)}"
													th:text="${c.observacion}">Obs</div>
											</td>
											<td class="text-end">
												<form th:action="@{'/no-pago/eliminar/' + ${c.id}}" method="post">
													<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
													<button type="submit" class="btn btn-outline-danger btn-sm rounded-pill">Eliminar</button>
												</form>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{layout/layout :: footer}"></footer>
	<script>
		(function() {
			const scope = document.getElementById('scopeSelect');
			const catWrap = document.getElementById('categoriaWrap');
			const depWrap = document.getElementById('deportistaWrap');
			function sync() {
				const v = scope ? scope.value : 'CLUB';
				if (catWrap) catWrap.classList.toggle('d-none', v !== 'CATEGORIA');
				if (depWrap) depWrap.classList.toggle('d-none', v !== 'DEPORTISTA');
			}
			if (scope) {
				scope.addEventListener('change', sync);
				sync();
			}
		})();
	</script>
</body>

</html>
