<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/layout :: head}"></head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{layout/layout :: header}"></header>

	<main class="flex-grow-1 bg-light">
		<div class="container-fluid px-3 px-lg-4 py-3 py-lg-4" style="max-width: 720px;">

			<div class="mb-2">
				<h3 class="fw-bold text-primary mb-1" th:text="${titulo}">Cuenta bancaria</h3>
				<p class="text-muted small mb-0">Datos que verán los apoderados para transferir y adjuntar comprobante.</p>
			</div>

			<nav th:replace="~{fragments/cuentasNav :: subnav}"></nav>

			<div class="card border-0 shadow-sm rounded-3 overflow-hidden">
				<div class="card-header bg-white border-bottom py-3 px-3 px-lg-4 d-flex align-items-center gap-2">
					<span class="rounded-circle bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center"
						style="width:40px;height:40px;">
						<i class="fas fa-university"></i>
					</span>
					<div>
						<h3 class="h6 mb-0 fw-semibold text-dark" th:text="${tieneCuenta} ? 'Actualizar datos' : 'Registrar cuenta'">Cuenta</h3>
						<p class="small text-muted mb-0">Banco, tipo, número, titular, RUT y email de contacto</p>
					</div>
				</div>
				<div class="card-body p-3 p-lg-4">
					<form th:action="@{/cuentas/guardar-bancaria}" th:object="${cuenta}" method="post" class="row g-3">

						<div class="col-md-6">
							<label class="form-label fw-semibold">
								<i class="fas fa-university text-primary"></i> Banco
							</label>
							<select th:field="*{banco}" class="form-select" th:errorclass="'is-invalid'">
								<option value="">Seleccione un banco</option>
								<option th:each="bancoItem : ${listadoBancos}" th:value="${bancoItem.id}"
									th:text="${bancoItem.nombre}"></option>
							</select>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('banco')}" th:errors="*{banco}"></div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">
								<i class="fas fa-list text-primary"></i> Tipo de cuenta
							</label>
							<select th:field="*{tipoCuenta}" class="form-select" th:errorclass="'is-invalid'">
								<option value="">-- Seleccione --</option>
								<option th:if="${cuenta.tipoCuenta != null and !#strings.isEmpty(cuenta.tipoCuenta)
									and cuenta.tipoCuenta != 'Cuenta Corriente' and cuenta.tipoCuenta != 'Cuenta Vista'
									and cuenta.tipoCuenta != 'Cuenta de Ahorro'}"
									th:value="${cuenta.tipoCuenta}" th:text="${cuenta.tipoCuenta}">Valor guardado</option>
								<option value="Cuenta Corriente">Cuenta Corriente</option>
								<option value="Cuenta Vista">Cuenta Vista</option>
								<option value="Cuenta de Ahorro">Cuenta de Ahorro</option>
							</select>
							<div class="invalid-feedback" th:if="${#fields.hasErrors('tipoCuenta')}"
								th:errors="*{tipoCuenta}"></div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">
								<i class="fas fa-hashtag text-primary"></i> Número de cuenta
							</label>
							<input th:field="*{numeroCuenta}" type="text" class="form-control" th:errorclass="'is-invalid'">
							<div class="invalid-feedback" th:if="${#fields.hasErrors('numeroCuenta')}"
								th:errors="*{numeroCuenta}"></div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">
								<i class="fas fa-user text-primary"></i> Titular
							</label>
							<input th:field="*{nombreTitular}" type="text" class="form-control" th:errorclass="'is-invalid'">
							<div class="invalid-feedback" th:if="${#fields.hasErrors('nombreTitular')}"
								th:errors="*{nombreTitular}"></div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">
								<i class="fas fa-id-card text-primary"></i> RUT
							</label>
							<input th:field="*{rut}" type="text" class="form-control" th:errorclass="'is-invalid'">
							<div class="invalid-feedback" th:if="${#fields.hasErrors('rut')}" th:errors="*{rut}"></div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">
								<i class="fas fa-envelope text-primary"></i> Email
							</label>
							<input th:field="*{email}" type="email" class="form-control" th:errorclass="'is-invalid'">
							<div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
						</div>

						<div class="col-12 text-center mt-3">
							<button type="submit" class="btn btn-success rounded-pill px-4">
								<i class="fas fa-save me-1"></i> Guardar cuenta bancaria
							</button>
						</div>
					</form>
				</div>
			</div>

		</div>
	</main>

	<footer th:replace="~{layout/layout :: footer}"></footer>
	<script th:src="@{/js/cuenta.js}"></script>
</body>
</html>
