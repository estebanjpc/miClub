<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/layout :: head}" />
<body class="d-flex flex-column min-vh-100">
<header th:replace="~{layout/layout :: header}"></header>

<main class="flex-grow-1 bg-light">
	<div class="container-fluid px-3 px-lg-4 py-3 py-lg-4" style="max-width: 1100px;">
		<div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
			<div>
				<h3 class="fw-bold text-primary mb-0" th:text="${titulo}">Registro de asistencia</h3>
				<p class="text-muted small mb-0 mt-1">Marca presentes y guarda por fecha de clase.</p>
			</div>
		</div>

		<div class="card border-0 shadow-sm rounded-3 overflow-hidden">
			<div class="card-body p-3 p-lg-4">
				<form th:action="@{/asistencia/registro}" method="post" class="row g-3">
					<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
					<div class="col-md-3">
						<label class="form-label fw-semibold">Fecha de clase</label>
						<input type="date" name="fechaClase" class="form-control" th:value="${fechaClase}" required />
					</div>
					<div class="col-12">
						<div class="table-responsive border rounded-3">
							<table class="table table-sm table-hover mb-0">
								<thead class="table-light">
									<tr>
										<th style="width:4rem;">Presente</th>
										<th>Deportista</th>
										<th>Categoría</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="d : ${deportistas}">
										<td class="text-center">
											<input type="checkbox" class="form-check-input" name="presentesIds"
												th:value="${d.id}" th:checked="${presentes.contains(d.id)}" />
										</td>
										<td th:text="${d.nombre + ' ' + d.apellido}">—</td>
										<td th:text="${d.categoria != null ? d.categoria.nombre : '—'}">—</td>
									</tr>
									<tr th:if="${deportistas == null or deportistas.isEmpty()}">
										<td colspan="3" class="text-center text-muted py-4">No hay deportistas activos para registrar.</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
					<div class="col-12">
						<button type="submit" class="btn btn-primary rounded-pill px-4">
							<i class="fas fa-save me-1"></i> Guardar asistencia
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</main>

<footer th:replace="~{layout/layout :: footer}"></footer>
</body>
</html>
