<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/layout :: head}">
	<style>
		.is-invalid {
			border-color: #dc3545 !important;
			box-shadow: 0 0 0 0.15rem rgba(220, 53, 69, 0.25);
		}

		.invalid-feedback {
			display: block;
			color: #dc3545;
			font-size: 0.875em;
		}
	</style>
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{layout/layout :: header}"></header>

	<main class="flex-grow-1 bg-light">
		<div class="container-fluid px-3 px-lg-4 py-3 py-lg-4" style="max-width: 720px;">

			<div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
				<div>
					<h3 class="fw-bold text-primary mb-0" th:text="${titulo}">Categoría</h3>
					<p class="text-muted small mb-0 mt-1">Define el nombre y el valor de la cuota mensual.</p>
				</div>
				<a th:href="@{/categorias/listar}" class="btn btn-outline-secondary btn-sm rounded-pill">
					<i class="fas fa-arrow-left me-1"></i> Volver al listado
				</a>
			</div>

			<div class="card border-0 shadow-sm rounded-3 overflow-hidden">
				<div class="card-header bg-white border-bottom py-3 px-3 px-lg-4 d-flex align-items-center gap-2">
					<span class="rounded-circle bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center"
						style="width:40px;height:40px;">
						<i class="fas fa-tag"></i>
					</span>
					<div>
						<h3 class="h6 mb-0 fw-semibold text-dark">Datos de la categoría</h3>
						<p class="small text-muted mb-0">Nombre visible para apoderados y monto</p>
					</div>
				</div>
				<div class="card-body p-3 p-lg-4">
					<form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post" class="row g-3">

						<div class="col-md-6">
							<label class="form-label fw-semibold">Nombre de la categoría</label>
							<input th:field="*{nombre}" type="text" placeholder="Ej: Sub 12" class="form-control"
								th:classappend="${#fields.hasErrors('nombre') or (nombreDuplicado ?: false)} ? 'is-invalid' : ''" />
							<div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}"
								th:errors="*{nombre}"></div>
							<div class="invalid-feedback" th:if="${nombreDuplicado ?: false}">
								Ya existe una categoría con ese nombre en este club.
							</div>
						</div>

						<div class="col-md-6">
							<label class="form-label fw-semibold">Valor cuota</label>
							<input th:field="*{valorCuota}" type="text" placeholder="Ej: 25000" class="form-control"
								th:classappend="${#fields.hasErrors('valorCuota')} ? 'is-invalid' : ''" />
							<div class="invalid-feedback" th:if="${#fields.hasErrors('valorCuota')}"
								th:errors="*{valorCuota}"></div>
						</div>

						<div class="col-12 border-top pt-4 mt-2 d-flex flex-wrap justify-content-center gap-2">
							<a th:href="@{/categorias/listar}" class="btn btn-outline-secondary rounded-pill px-4">
								<i class="fas fa-arrow-left me-1"></i> Volver
							</a>
							<button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm">
								<i class="fas fa-save me-1"></i> Guardar
							</button>
						</div>

					</form>
				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{layout/layout :: footer}"></footer>
</body>

</html>
