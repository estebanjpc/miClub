<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/layout :: head}" />

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{layout/layout :: header}"></header>

	<main class="flex-grow-1 bg-light">
		<div class="container-fluid px-3 px-lg-4 py-3 py-lg-4" style="max-width: 1400px;">

			<div class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-3">
				<div>
					<h3 class="fw-bold text-primary mb-0" th:text="${titulo}">Categorías</h3>
					<p class="text-muted small mb-0 mt-1">Valor de cuota por categoría en tu club.</p>
				</div>
				<a th:href="@{/categorias/crear}" class="btn btn-primary btn-sm rounded-pill shadow-sm">
					<i class="fas fa-plus-circle me-1"></i> Nueva categoría
				</a>
			</div>

			<div class="row g-2 g-lg-3 mb-3" th:with="total=${listadoCategorias != null ? #lists.size(listadoCategorias) : 0}">
				<div class="col-6 col-md-3">
					<div class="card border-0 shadow-sm h-100 rounded-3">
						<div class="card-body py-3 px-3 d-flex align-items-center gap-3">
							<span class="rounded-circle bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center flex-shrink-0"
								style="width:44px;height:44px;">
								<i class="fas fa-tags"></i>
							</span>
							<div>
								<h6 class="text-muted text-uppercase small mb-0">Categorías</h6>
								<h4 class="mb-0 fw-semibold" th:text="${total}">0</h4>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="card border-0 shadow-sm rounded-3 overflow-hidden">
				<div class="card-header bg-white border-bottom py-3 px-3 px-lg-4 d-flex align-items-center gap-2">
					<span class="rounded-circle bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center"
						style="width:40px;height:40px;">
						<i class="fas fa-list"></i>
					</span>
					<div>
						<h3 class="h6 mb-0 fw-semibold text-dark">Listado</h3>
						<p class="small text-muted mb-0">Editar o eliminar categorías</p>
					</div>
				</div>
				<div class="card-body p-0">
					<div class="table-responsive">
						<table class="table table-hover align-middle table-striped table-sm mb-0">
							<thead class="bg-primary text-white">
								<tr>
									<th style="width:3rem;">#</th>
									<th>Nombre</th>
									<th class="text-end">Valor cuota</th>
									<th class="text-center" style="width:6rem;">Editar</th>
									<th class="text-center" style="width:6rem;">Eliminar</th>
								</tr>
							</thead>
							<tbody>
								<tr th:each="cat, cont : ${listadoCategorias}">
									<td class="text-muted small" th:text="${cont.index + 1}"></td>
									<td class="fw-medium" th:text="${cat.nombre}"></td>
									<td class="text-end" th:text="${#numbers.formatDecimal(cat.valorCuota, 0, 'POINT', 0, 'COMMA')}"></td>
									<td class="text-center">
										<a th:href="@{'/categorias/editar/' + ${cat.id}}"
											class="btn btn-outline-primary btn-sm rounded-pill px-2"
											data-bs-toggle="tooltip" title="Editar">
											<i class="fas fa-edit"></i>
										</a>
									</td>
									<td class="text-center">
										<button type="button" th:onclick="eliminarCategoria([[${cat.id}]])"
											class="btn btn-outline-danger btn-sm rounded-pill px-2"
											data-bs-toggle="tooltip" title="Eliminar">
											<i class="fas fa-trash-alt"></i>
										</button>
									</td>
								</tr>
								<tr th:if="${#lists.isEmpty(listadoCategorias)}">
									<td colspan="5" class="text-center text-muted py-5">
										<i class="fas fa-folder-open fa-2x mb-2 d-block opacity-50"></i>
										No hay categorías registradas
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{layout/layout :: footer}"></footer>
	<script th:src="@{/js/categoria.js}"></script>
</body>

</html>
