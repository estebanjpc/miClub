spring.application.name=AdminClub
# En producción: definir credenciales solo por entorno o secret manager (no versionar valores reales).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost/bd_adm_club?serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mysql.mysql}
logging.level.org.hibernate.SQL=debug
logging.pattern.level=%5p [cid:%X{correlationId:-N/A}]
# Producción: usar validate o none + migraciones (Flyway/Liquibase). create-drop borra datos al reiniciar.
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=80

# URL pública de la app (enlaces en correos). Producción: https://adminclub.cl
app.public.url=http://localhost:8081

# Admin: permite «Entrar como soporte» desde el detalle de club (sesión de club + solo lectura en pagos).
admin.soporte.enabled=false

mail.set.from=${MAIL_FROM:test@ircd.cl}
spring.mail.host=${SPRING_MAIL_HOST:mail.ircd.cl}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:test@ircd.cl}
spring.mail.password=${SPRING_MAIL_PASSWORD:Jesusteama.11}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true


spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# Secreto del comercio (HMAC del webhook). Por club: campo en cuenta bancaria; si no, este valor.
khipu.merchant.secret=${KHIPU_MERCHANT_SECRET:}
khipu.webhook.verify-signature=true
khipu.webhook.max-timestamp-skew-ms=300000
khipu.webhook.rate-limit.max-requests-per-minute=60

notifications.scheduler.enabled=true
notifications.scheduler.cron=0 0 8 * * ?