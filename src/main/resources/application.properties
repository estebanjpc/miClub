spring.application.name=AdminClub
# En producción: definir credenciales solo por entorno o secret manager (no versionar valores reales).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost/bd_adm_club?serverTimezone=America/Santiago&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mysql.mysql}
logging.level.org.hibernate.SQL=debug
# Producción: usar validate o none + migraciones (Flyway/Liquibase). create-drop borra datos al reiniciar.
spring.jpa.hibernate.ddl-auto=create-drop
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=8081

# URL pública de la app (enlaces en correos). Sobrescribe en prod, p. ej. https://miclub.ejemplo.cl
app.public.url=http://localhost:8081

