# Perfil producción — activar con SPRING_PROFILES_ACTIVE=prod
# Secretos vía variables de entorno (ver .env.example)

server.port=${SERVER_PORT:80}

# Nunca create-drop en producción
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.type.descriptor.sql=warn

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

app.public.url=${APP_PUBLIC_URL}

mail.set.from=${MAIL_FROM:test@ircd.cl}
spring.mail.host=${SPRING_MAIL_HOST:mail.ircd.cl}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:test@ircd.cl}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

khipu.merchant.secret=${KHIPU_MERCHANT_SECRET:}
khipu.webhook.verify-signature=${KHIPU_WEBHOOK_VERIFY_SIGNATURE:true}

admin.soporte.enabled=${ADMIN_SOPORTE_ENABLED:false}
notifications.scheduler.enabled=${NOTIFICATIONS_SCHEDULER_ENABLED:true}
