# Perfil test: BD en memoria, sin SMTP real
spring.datasource.url=jdbc:h2:mem:admclub_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=false
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.orm.jdbc.bind=off

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

khipu.webhook.verify-signature=false
khipu.merchant.secret=test-merchant-secret
