# App DESA — sin contenedor MySQL (usa mysql-server compartido).
# Ubicación sugerida en el VPS: /root/admin-club/desa/docker-compose.yml
#
# Requisito: levantar antes deploy/docker-compose-mysql.yml

version: '3.8'

services:
  mi-club-desa:
    image: estebanjpc/mi-club:desa
    container_name: app-club-desa
    restart: always
    ports:
      - "8080:80"
    networks:
      - shared-db-net
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/bd_adm_club_desa?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Santiago
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=Mysql.mysql
      - SPRING_JPA_DDL_AUTO=validate
      - SERVER_PORT=80
      - APP_PUBLIC_URL=http://45.7.229.27:8080
      - MAIL_FROM=test@ircd.cl
      - SPRING_MAIL_HOST=mail.ircd.cl
      - SPRING_MAIL_PORT=587
      - SPRING_MAIL_USERNAME=test@ircd.cl
      - SPRING_MAIL_PASSWORD=tu_password_ircd
      - KHIPU_WEBHOOK_VERIFY_SIGNATURE=true
      - ADMIN_SOPORTE_ENABLED=false
      - NOTIFICATIONS_SCHEDULER_ENABLED=true

networks:
  shared-db-net:
    external: true
    name: shared-db-net
