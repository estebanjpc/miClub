# Plantilla app-only (MySQL compartido en deploy/docker-compose-mysql.yml).
# Copiar a /root/admin-club/prod o /root/admin-club/desa junto con .env del entorno.
#
# En .env:
#   DOCKER_IMAGE=tuusuario/mi-club:prod|desa
#   SPRING_DATASOURCE_URL=jdbc:mysql://mysql-server:3306/bd_adm_club_pro|bd_adm_club_desa?...

services:
  app:
    image: ${DOCKER_IMAGE}
    container_name: ${APP_CONTAINER_NAME:-adminclub-app}
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "${APP_HOST_PORT:-8080}:${SERVER_PORT:-80}"
    networks:
      - shared-db-net

networks:
  shared-db-net:
    external: true
    name: shared-db-net
